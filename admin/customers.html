<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customers — Admin MAYREE</title>
<link rel="stylesheet" href="/css/mayree.css"/>
<link rel="icon" href="/assets/logo.png"/>


<style id="admin-gate-style">
#admin-password-gate{position:fixed;inset:0;background:#FDFBF7;z-index:99999;display:flex;align-items:center;justify-content:center;}
.gate-box{width:100%;max-width:380px;padding:52px 44px;text-align:center;border:1px solid rgba(201,168,122,.25);}
.gate-logo{height:52px;margin:0 auto 32px;display:block;}
.gate-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:2px;color:#1A1208;margin-bottom:4px;}
.gate-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#9A8878;margin-bottom:28px;}
.gate-input{width:100%;background:#F7F3EC;border:1px solid rgba(201,168,122,.3);padding:13px 16px;font-size:16px;font-family:'Jost',sans-serif;color:#1A1208;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;transition:border-color .25s;}
.gate-input:focus{border-color:#C9A87A;}
.gate-btn{width:100%;background:#3D2B1F;color:#FDFBF7;border:none;padding:14px;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;}
.gate-btn:hover{background:#6B4E37;}
.gate-error{font-size:11px;color:#E53935;margin-top:10px;letter-spacing:1px;min-height:16px;}
</style>
</head>
<body class="page-fade">
<div id="admin-password-gate">
  <div class="gate-box">
    <img class="gate-logo" src="/assets/logo.png" alt="MAYREE"/>
    <div class="gate-title">Admin Panel</div>
    <div class="gate-sub">Enter password to continue</div>
    <input type="password" class="gate-input" id="gate-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkGate()" autocomplete="off"/>
    <button class="gate-btn" onclick="checkGate()">Enter</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>
<script>
var _AP = 'A12dcmoney';
var _AK = 'myadmin99';
if(sessionStorage.getItem(_AK)==='1'){
  document.getElementById('admin-password-gate').style.display='none';
}
function checkGate(){
  var v=document.getElementById('gate-input').value;
  if(v===_AP){
    sessionStorage.setItem(_AK,'1');
    document.getElementById('admin-password-gate').style.display='none';
  } else {
    document.getElementById('gate-error').textContent='Incorrect password';
    document.getElementById('gate-input').value='';
    document.getElementById('gate-input').focus();
  }
}
</script>
</div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <img src="/assets/logo.png" alt="MAYREE"/>
      <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(201,168,122,.5);margin-top:8px;">Admin Panel</div>
    </div>
    <a href="/admin/index.html" class="admin-nav-link">📊 &nbsp;Dashboard</a>
    <a href="/admin/products.html" class="admin-nav-link">👜 &nbsp;Products</a>
    <a href="/admin/orders.html" class="admin-nav-link">📦 &nbsp;Orders</a>
    <a href="/admin/customers.html" class="admin-nav-link active">👥 &nbsp;Customers</a>
    <div style="border-top:1px solid rgba(255,255,255,.08);margin:24px 0;"></div>
    <a href="/index.html" class="admin-nav-link">🏠 &nbsp;View Site</a>
    <a href="#" onclick="logout()" class="admin-nav-link" style="color:rgba(229,57,53,.7);">⬅ &nbsp;Sign Out</a>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-title">Customers</h1>
      <input type="text" id="search-customers" class="form-control" placeholder="Search by name or email..." style="max-width:280px;" oninput="filterCustomers()"/>
    </div>

    <div style="background:var(--ivory);border:1px solid var(--border);">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Orders</th>
            <th>Total Spent</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="customers-body">
          <tr><td colspan="6" style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/admin.js"></script>
<script>
  let allCustomers = [];

  async function init() {
    

    // Fetch profiles with their order counts and totals
    const { data: profiles } = await sb.from('profiles').select('*').order('id', { ascending: false });
    const { data: orders } = await sb.from('orders').select('user_id, total, status');

    // Merge order data into profiles
    allCustomers = (profiles || []).map(p => {
      const userOrders = (orders || []).filter(o => o.user_id === p.id);
      const totalSpent = userOrders
        .filter(o => ['paid','processing','shipped','delivered'].includes(o.status))
        .reduce((s, o) => s + (o.total || 0), 0);
      return { ...p, orderCount: userOrders.length, totalSpent };
    });

    renderCustomers(allCustomers);
  }

  function filterCustomers() {
    const search = document.getElementById('search-customers').value.toLowerCase();
    const filtered = allCustomers.filter(c =>
      !search ||
      (c.full_name || '').toLowerCase().includes(search) ||
      (c.email || '').toLowerCase().includes(search)
    );
    renderCustomers(filtered);
  }

  function renderCustomers(customers) {
    const tbody = document.getElementById('customers-body');
    if (!customers.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);">No customers found</td></tr>';
      return;
    }
    tbody.innerHTML = customers.map(c => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:50%;background:var(--champagne);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--ivory);flex-shrink:0;">
              ${(c.full_name || c.email || '?').charAt(0).toUpperCase()}
            </div>
            <span style="font-family:'Cormorant Garamond',serif;font-size:16px;">${c.full_name || '—'}</span>
          </div>
        </td>
        <td style="font-size:13px;color:var(--muted);">${c.email || '—'}</td>
        <td style="font-size:13px;color:var(--muted);">${c.phone || '—'}</td>
        <td style="font-size:14px;">${c.orderCount} order${c.orderCount !== 1 ? 's' : ''}</td>
        <td style="font-size:14px;font-weight:400;">${fmt(c.totalSpent)}</td>
        <td>
          <div style="display:flex;gap:8px;">
            ${c.email ? `<a href="mailto:${c.email}" class="btn btn-ghost btn-sm">Email</a>` : ''}
            ${c.phone ? `<a href="https://wa.me/${c.phone.replace(/\D/g,'')}" target="_blank" class="btn btn-gold btn-sm">WhatsApp</a>` : ''}
          </div>
        </td>
      </tr>`).join('');
  }

  init();
</script>
</body>
</html>
