<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orders — Admin MAYREE</title>
<link rel="stylesheet" href="/css/mayree.css"/>
<link rel="icon" href="/assets/logo.png"/>
</head>
<body class="page-fade">
<div id="auth-gate" style="position:fixed;inset:0;background:#FDFBF7;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;"><img src="/assets/logo.png" style="height:60px;opacity:.6;"/><div style="width:28px;height:28px;border:2px solid #EDE5D8;border-top-color:#C9A87A;border-radius:50%;animation:spin .8s linear infinite;"></div></div>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <img src="/assets/logo.png" alt="MAYREE"/>
      <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(201,168,122,.5);margin-top:8px;">Admin Panel</div>
    </div>
    <a href="/admin/index.html" class="admin-nav-link">📊 &nbsp;Dashboard</a>
    <a href="/admin/products.html" class="admin-nav-link">👜 &nbsp;Products</a>
    <a href="/admin/orders.html" class="admin-nav-link active">📦 &nbsp;Orders</a>
    <a href="/admin/customers.html" class="admin-nav-link">👥 &nbsp;Customers</a>
    <div style="border-top:1px solid rgba(255,255,255,.08);margin:24px 0;"></div>
    <a href="/index.html" class="admin-nav-link">🏠 &nbsp;View Site</a>
    <a href="#" onclick="logout()" class="admin-nav-link" style="color:rgba(229,57,53,.7);">⬅ &nbsp;Sign Out</a>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-title">Orders</h1>
      <div style="display:flex;gap:12px;align-items:center;">
        <input type="text" id="search-orders" class="form-control" placeholder="Search by reference..." style="max-width:220px;" oninput="filterOrders()"/>
        <select id="filter-status" class="form-control" style="max-width:160px;" onchange="filterOrders()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>

    <!-- TABS -->
    <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;">
      <button class="tab-btn active" id="t-all" onclick="setStatusFilter('',this)" style="background:none;border:none;padding:12px 20px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border-bottom:2px solid var(--gold);font-family:'Jost',sans-serif;">All</button>
      <button class="tab-btn" id="t-pending" onclick="setStatusFilter('pending',this)" style="background:none;border:none;padding:12px 20px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;font-family:'Jost',sans-serif;">Pending</button>
      <button class="tab-btn" id="t-paid" onclick="setStatusFilter('paid',this)" style="background:none;border:none;padding:12px 20px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;font-family:'Jost',sans-serif;">Paid</button>
      <button class="tab-btn" id="t-shipped" onclick="setStatusFilter('shipped',this)" style="background:none;border:none;padding:12px 20px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;font-family:'Jost',sans-serif;">Shipped</button>
      <button class="tab-btn" id="t-delivered" onclick="setStatusFilter('delivered',this)" style="background:none;border:none;padding:12px 20px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;font-family:'Jost',sans-serif;">Delivered</button>
    </div>

    <div style="background:var(--ivory);border:1px solid var(--border);">
      <table class="data-table">
        <thead><tr><th>Reference</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody id="orders-body"><tr><td colspan="7" style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal" style="max-width:700px;">
    <button class="modal-close" onclick="document.getElementById('order-modal').classList.remove('open')">✕</button>
    <h2 class="modal-title">Order Details</h2>
    <div id="order-detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/admin.js"></script>
<script>
  let allOrders = [];
  let activeStatus = '';

  async function init() {
    await requireAdmin();
    allOrders = await adminFetchOrders();
    renderOrders(allOrders);
  }

  function setStatusFilter(status, btn) {
    activeStatus = status;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.style.color = 'var(--muted)';
      b.style.borderBottom = '2px solid transparent';
    });
    btn.style.color = 'var(--gold)';
    btn.style.borderBottom = '2px solid var(--gold)';
    filterOrders();
  }

  function filterOrders() {
    const search = document.getElementById('search-orders').value.toLowerCase();
    const statusFilter = document.getElementById('filter-status').value || activeStatus;
    const filtered = allOrders.filter(o =>
      (!search || o.reference?.toLowerCase().includes(search) || o.profiles?.email?.toLowerCase().includes(search)) &&
      (!statusFilter || o.status === statusFilter)
    );
    renderOrders(filtered);
  }

  const statusColors = { pending:'#C9A87A', paid:'#4CAF50', processing:'#2196F3', shipped:'#9C27B0', delivered:'#388E3C', cancelled:'#F44336' };

  function renderOrders(orders) {
    const tbody = document.getElementById('orders-body');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">No orders found</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td style="font-family:'Cormorant Garamond',serif;font-size:15px;">${o.reference}</td>
        <td>
          <div style="font-size:13px;">${o.profiles?.full_name || '—'}</div>
          <div style="font-size:11px;color:var(--muted);">${o.profiles?.email || ''}</div>
          <div style="font-size:11px;color:var(--muted);">${o.profiles?.phone || ''}</div>
        </td>
        <td>${(o.items||[]).length} item(s)</td>
        <td style="font-weight:400;">${fmt(o.total)}</td>
        <td>
          <select onchange="handleStatusChange('${o.id}',this.value)" style="background:${statusColors[o.status]||'#999'};color:white;border:none;padding:5px 10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;outline:none;">
            ${['pending','paid','processing','shipped','delivered','cancelled'].map(s =>
              `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`
            ).join('')}
          </select>
        </td>
        <td style="font-size:12px;">${new Date(o.created_at).toLocaleDateString('en-NG')}</td>
        <td>
          <button onclick="viewOrder('${o.id}')" class="btn btn-ghost btn-sm">View</button>
        </td>
      </tr>`).join('');
  }

  async function handleStatusChange(id, status) {
    await adminUpdateOrderStatus(id, status);
    showToast('Order updated to: ' + status);
    // Refresh
    const o = allOrders.find(o => o.id === id);
    if (o) o.status = status;
    filterOrders();
  }

  function viewOrder(id) {
    const o = allOrders.find(o => o.id === id);
    if (!o) return;

    const addr = o.shipping_address || {};
    const content = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
        <div>
          <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Reference</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:18px;">${o.reference}</div>
        </div>
        <div>
          <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Date</div>
          <div style="font-size:13px;">${new Date(o.created_at).toLocaleDateString('en-NG', {year:'numeric',month:'long',day:'numeric'})}</div>
        </div>
        <div>
          <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Customer</div>
          <div style="font-size:13px;">${o.profiles?.full_name || '—'}</div>
          <div style="font-size:12px;color:var(--muted);">${o.profiles?.email || ''}</div>
          <div style="font-size:12px;color:var(--muted);">${o.profiles?.phone || ''}</div>
        </div>
        <div>
          <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Shipping Address</div>
          <div style="font-size:13px;line-height:1.7;">${addr.firstName||''} ${addr.lastName||''}<br/>${addr.address||''}<br/>${addr.city||''}, ${addr.state||''}<br/>${addr.country||''}</div>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px;">
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;">Items Ordered</div>
        ${(o.items||[]).map(item => `
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;">
            <div>${item.name} <span style="color:var(--muted);">× ${item.qty}</span></div>
            <div>${fmt(item.price * item.qty)}</div>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:12px 0;font-size:13px;color:var(--muted);"><span>Shipping</span><span>${fmt(o.shipping||0)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:12px 0;font-family:'Cormorant Garamond',serif;font-size:20px;">
          <span>Total</span><span>${fmt(o.total)}</span>
        </div>
      </div>
      ${o.notes ? `<div style="background:var(--cream);padding:14px;font-size:12px;color:var(--muted);"><strong>Notes:</strong> ${o.notes}</div>` : ''}
      <div style="margin-top:20px;display:flex;gap:10px;">
        <a href="https://wa.me/${(o.profiles?.phone||'').replace(/\D/g,'')}?text=Hi%20${addr.firstName||''}%2C%20your%20Mayree%20order%20${o.reference}%20has%20been%20shipped!" target="_blank" class="btn btn-gold btn-sm">WhatsApp Customer</a>
        <a href="mailto:${o.profiles?.email||''}" class="btn btn-ghost btn-sm">Email Customer</a>
      </div>`;

    document.getElementById('order-detail-content').innerHTML = content;
    document.getElementById('order-modal').classList.add('open');
  }

  init();
</script>
</body>
</html>
