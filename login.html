<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — MAYREE</title>
<link rel="stylesheet" href="/css/mayree.css"/>
<link rel="icon" href="/assets/logo.png"/>
<style>
.auth-wrap { min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; padding: 52px 20px; }
.auth-box { background: var(--ivory); width: 100%; max-width: 460px; padding: 52px 48px; border: 1px solid var(--border); }
.auth-logo { text-align: center; margin-bottom: 36px; }
.auth-logo img { height: 60px; width: auto; display: inline-block; }
.tab-bar { display: flex; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 13px; background: none; border: none; cursor: pointer; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-family: 'Jost', sans-serif; transition: color .25s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.auth-form { display: none; }
.auth-form.active { display: block; }
.divider { display: flex; align-items: center; gap: 14px; margin: 20px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.forgot-link { font-size: 11px; color: var(--champagne); float: right; letter-spacing: 1px; }
.forgot-link:hover { color: var(--gold); }
</style>
</head>
<body class="page-fade">

<nav class="main-nav">
  <div class="nav-inner">
    <div class="nav-left"><a href="/index.html" class="nav-link">← Back to Home</a></div>
    <div class="nav-logo"><a href="/index.html"><img src="/assets/logo.png" alt="MAYREE"/></a></div>
    <div class="nav-right">
      <button class="nav-icon" onclick="window.location='/cart.html'" style="position:relative">🛍 <span class="cart-count" id="cart-badge">0</span></button>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="/assets/logo.png" alt="MAYREE"/>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="hello@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot?</a></label>
        <input type="password" id="login-password" class="form-control" placeholder="Your password"/>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <button class="btn btn-dark btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
      </div>
      <div class="divider"><span>or continue with</span></div>
      <button class="btn btn-ghost btn-full" onclick="googleLogin()" style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <span>G</span> Sign in with Google
      </button>
    </div>

    <!-- REGISTER -->
    <div class="auth-form" id="form-register">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" id="reg-first" class="form-control" placeholder="First name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" id="reg-last" class="form-control" placeholder="Last name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="reg-email" class="form-control" placeholder="hello@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="reg-phone" class="form-control" placeholder="+234 800 000 0000"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-control" placeholder="Min. 8 characters"/>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <button class="btn btn-dark btn-full" id="register-btn" onclick="doRegister()">Create Account</button>
      </div>
      <p style="font-size:11px;color:var(--muted);text-align:center;line-height:1.7;">By creating an account you agree to our <a href="#" style="color:var(--champagne);">Terms of Service</a> and <a href="#" style="color:var(--champagne);">Privacy Policy</a>.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/content.js"></script>
<script src="/js/cart.js"></script>
<script>
  updateCartBadge();

  // Check if already logged in
  getUser().then(user => {
    if (user) {
      const redirect = getParam('redirect') || '/account.html';
      window.location.href = redirect;
    }
  });

  // Check if tab param
  const tab = getParam('tab');
  if (tab === 'register') switchTab('register');

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('form-' + tab).classList.add('active');
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }

    const btn = document.getElementById('login-btn');
    setLoading(btn, true, 'Signing in...');

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showToast(error.message || 'Sign in failed', 'error');
      setLoading(btn, false, 'Sign In');
      return;
    }

    showToast('Welcome back!');
    const redirect = getParam('redirect') || '/account.html';
    setTimeout(() => window.location.href = redirect, 800);
  }

  async function doRegister() {
    const firstName = document.getElementById('reg-first').value;
    const lastName = document.getElementById('reg-last').value;
    const email = document.getElementById('reg-email').value;
    const phone = document.getElementById('reg-phone').value;
    const password = document.getElementById('reg-password').value;

    if (!firstName || !lastName || !email || !password) { showToast('Please fill in all fields', 'error'); return; }
    if (password.length < 8) { showToast('Password must be at least 8 characters', 'error'); return; }

    const btn = document.getElementById('register-btn');
    setLoading(btn, true, 'Creating account...');

    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      showToast(error.message || 'Registration failed', 'error');
      setLoading(btn, false, 'Create Account');
      return;
    }

    // Create profile
    if (data.user) {
      await sb.from('profiles').insert({
        id: data.user.id,
        email,
        full_name: `${firstName} ${lastName}`,
        phone,
        address: ''
      });
    }

    showToast('Account created! Please check your email to verify.');
    setLoading(btn, false, 'Create Account');
    switchTab('login');
  }

  async function googleLogin() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/account.html' }
    });
    if (error) showToast(error.message, 'error');
  }

  async function forgotPassword() {
    const email = document.getElementById('login-email').value;
    if (!email) { showToast('Enter your email first', 'error'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/account.html'
    });
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Password reset email sent!');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('form-login').classList.contains('active')) doLogin();
      else doRegister();
    }
  });
</script>
</body>
</html>
